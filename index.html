<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modelo 3D AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

model-viewer{
width:100%;
height:100%;
}

#info{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="info">
👆 Gira el modelo<br>
🔎 Zoom con dedos<br>
📱 Botón AR para verlo en tu mesa
</div>

<model-viewer
src="modelo.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral"
exposure="1"
>

</model-viewer>

</body>
</html>
