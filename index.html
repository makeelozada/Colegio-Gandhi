<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Visor 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#e5e5e5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:black;
}

model-viewer{
width:100%;
height:100%;
background:#e5e5e5;
}

#info{
position:absolute;
top:10px;
left:10px;
background:rgba(255,255,255,0.8);
padding:10px;
border-radius:8px;
font-size:14px;
}

</style>
</head>

<body>

<div id="info">
👆 Arrastra para girar<br>
🔎 Zoom con dedos<br>
📱 Presiona AR para verlo en tu mesa
</div>

<model-viewer

src="modelo.glb"

camera-controls
auto-rotate
rotation-per-second="30deg"

shadow-intensity="1"

environment-image="neutral"

exposure="1"

reveal="auto"

ar
ar-modes="webxr scene-viewer quick-look"

>

</model-viewer>

</body>

</html>
