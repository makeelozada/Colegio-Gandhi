<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Visor 3D</title>

<style>

body{
margin:0;
overflow:hidden;
background:#1a1a1a;
font-family:Arial;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

#fullscreen{
position:absolute;
bottom:20px;
right:20px;
background:#ffffff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="info">
Visor 3D<br>
👆 Arrastra para girar<br>
🔎 Pellizca para zoom
</div>

<button id="fullscreen">Pantalla completa</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1,4);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// LUCES

let light1 = new THREE.HemisphereLight(0xffffff,0x444444,1.2);
scene.add(light1);

let light2 = new THREE.DirectionalLight(0xffffff,1);
light2.position.set(5,10,7);
scene.add(light2);



// CONTROLES

let controls = new THREE.OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;
controls.dampingFactor = 0.05;

controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;



// CARGAR MODELO

let objeto;

let loader = new THREE.GLTFLoader();

loader.load(

"modelo.glb",

function(gltf){

objeto = gltf.scene;

scene.add(objeto);

// centrar modelo automáticamente

let box = new THREE.Box3().setFromObject(objeto);
let center = box.getCenter(new THREE.Vector3());

objeto.position.sub(center);

},

function(xhr){

console.log((xhr.loaded/xhr.total*100)+"% cargado");

},

function(error){

console.error("Error cargando modelo:",error);

}

);



// GIROSCOPIO

window.addEventListener("deviceorientation",function(event){

if(objeto && event.gamma != null){

objeto.rotation.y = event.gamma * Math.PI/180;

}

});



// RESPONSIVE

window.addEventListener("resize",function(){

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});



// ANIMACION

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();



// BOTON PANTALLA COMPLETA

document.getElementById("fullscreen").onclick = function(){

if(!document.fullscreenElement){

document.body.requestFullscreen();

}else{

document.exitFullscreen();

}

};

</script>

</body>
</html>
